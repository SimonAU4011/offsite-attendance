---
name: Update Offsite Attendance Table

on:
  issue_comment:
    types: [created, edited]
  issues:
    types: [edited]

jobs:
  update-table:
    if: github.event_name == 'issues' || (github.event_name == 'issue_comment' && contains(github.event.comment.body, '✅ **Attendance registered for'))
    runs-on: ubuntu-latest
    concurrency:
      group: attendance-update-${{ github.event.issue.number }}
      cancel-in-progress: false
    permissions:
      contents: read
      issues: write
    steps:
      - name: Parse and Update Table
        uses: actions/github-script@v7
        env:
          HUBBERS_TOKEN: ${{ secrets.HUBBERS_READ_TOKEN }}
        with:
          script: |
            // ── Shared constants ───────────────────────────────────────
            const TABLE_RE = /(\|[^\n]*Your Handle[^\n]*\|[\r\n]+\|[-|\s]+\|[\r\n]+)((?:\|[^\n]*(?:\n|$))*?)(?=\n\n|\n[^|]|$)/i;
            const ATTENDANCE_TEXT_TO_EMOJI = { attending: '👍', unsure: '😐', not_attending: '👎', '👍': '👍', '😐': '😐', '👎': '👎' };
            const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
            const norm = (n) => n.replace(/[*_]/g, '').trim().toLowerCase();
            const escRe = (s) => s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');

            const isIssueEdit = context.eventName === 'issues';
            console.log(`=== Event: ${isIssueEdit ? 'issues.edited' : 'issue_comment.' + context.payload.action} ===`);

            // ── For issue edits, bail if the attendance table didn't change ──
            if (isIssueEdit) {
              const changes = context.payload.changes;
              if (!changes || !changes.body) { console.log('Body unchanged, skipping'); return; }

              const normWs = (t) => t.split('\n').map(l => l.trimEnd()).join('\n').trim();
              const oldM = changes.body.from.match(TABLE_RE);
              const newM = context.payload.issue.body.match(TABLE_RE);
              if (!oldM && !newM) { console.log('No attendance table, skipping'); return; }
              if (oldM && newM && normWs(oldM[0]) === normWs(newM[0])) { console.log('Table unchanged, skipping'); return; }
              console.log('Table changed, recounting summary…');
            }

            // ── For comments, validate all required fields ──────────────
            const comment = isIssueEdit ? null : context.payload.comment.body;
            if (!isIssueEdit) {
              const requiredFields = [
                /\*\*Microsoft ID\*\*\s*\|\s*([^|]*)/,
                /\*\*Attendance\*\*\s*\|\s*([^|]*)/,
                /\*\*Allergies\*\*\s*\|\s*([^|]*)/,
                /\*\*Dietary Requirements\*\*\s*\|\s*([^|]*)/,
                /\*\*Arrival Flight\*\*\s*\|\s*([^|]*)/,
                /\*\*Departure Flight\*\*\s*\|\s*([^|]*)/
              ];
              if (!requiredFields.every(p => p.test(comment))) {
                console.log('Comment missing required fields, skipping');
                return;
              }
            }

            // ── Parse comment data (for comment events) ─────────────────
            let username = '', msId = '', attendance = '', allergies = '';
            let dietary = '', arrival = '', departure = '', attendanceEmoji = '';

            if (!isIssueEdit) {
              username = context.payload.comment.user.login;
              console.log(`Processing registration for @${username}`);

              const decodeHtml = (s) => s.replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"').replace(/&#39;/g,"'").replace(/&#124;/g,'|');
              const sanitize = (s) => { if (!s) return ''; const d = decodeHtml(s); return d.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/\|/g,'&#124;'); };

              msId       = sanitize((comment.match(/\*\*Microsoft ID\*\*\s*\|\s*([^|]*)/)       || [])[1]?.trim() || '');
              attendance = sanitize((comment.match(/\*\*Attendance\*\*\s*\|\s*([^|]*)/)          || [])[1]?.trim() || '');
              allergies  = sanitize((comment.match(/\*\*Allergies\*\*\s*\|\s*([^|]*)/)           || [])[1]?.trim() || '');
              dietary    = sanitize((comment.match(/\*\*Dietary Requirements\*\*\s*\|\s*([^|]*)/) || [])[1]?.trim() || '');
              arrival    = sanitize((comment.match(/\*\*Arrival Flight\*\*\s*\|\s*([^|]*)/)       || [])[1]?.trim() || '');
              departure  = sanitize((comment.match(/\*\*Departure Flight\*\*\s*\|\s*([^|]*)/)     || [])[1]?.trim() || '');

              attendanceEmoji = ATTENDANCE_TEXT_TO_EMOJI[attendance] || '';
              if (attendance && !attendanceEmoji) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number,
                  body: `@${username} ⚠️ Unrecognized attendance value: "${attendance}". Expected: attending, unsure, not_attending, 👍, 😐, or 👎.`
                });
                core.setFailed(`Unrecognized attendance value: ${attendance}`);
                return;
              }
            }

            // ── Fetch hubbers.yml ───────────────────────────────────────
            console.log('Fetching hubbers.yml…');
            let hubbers = {};
            try {
              const token = process.env.HUBBERS_TOKEN;
              const resp = await fetch('https://api.github.com/repos/github/thehub/contents/docs/_data/hubbers.yml', {
                headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json' }
              });
              if (resp.ok) {
                const meta = await resp.json();
                let content;
                if (meta.size > 1_000_000 || !meta.content) {
                  const raw = await fetch(meta.download_url, { headers: { Authorization: `token ${token}` } });
                  content = await raw.text();
                } else {
                  content = Buffer.from(meta.content, 'base64').toString('utf-8');
                }
                let cur = null, data = {};
                for (const line of content.split('\n')) {
                  if (line && !line.startsWith(' ') && !line.startsWith('\t') && line.includes(':')) {
                    if (cur && data.name) { hubbers[cur] = {...data}; hubbers[cur.toLowerCase()] = {...data}; }
                    cur = line.split(':')[0].trim(); data = {};
                  } else if (cur) {
                    const t = line.trim();
                    if (t.startsWith('name:'))    data.name    = t.split(':').slice(1).join(':').trim();
                    if (t.startsWith('manager:')) data.manager = t.split(':').slice(1).join(':').trim();
                    if (t.startsWith('country:')) data.country = t.split(':').slice(1).join(':').trim();
                  }
                }
                if (cur && data.name) { hubbers[cur] = {...data}; hubbers[cur.toLowerCase()] = {...data}; }
                console.log(`Loaded ${Object.keys(hubbers).length / 2} hubber entries`);
              } else {
                console.log(`Warning: hubbers.yml HTTP ${resp.status}, continuing without team data`);
              }
            } catch (e) { console.log(`Warning: hubbers.yml error: ${e.message}`); }

            // ── Resolve user → manager → director ───────────────────────
            let managerLogin = '', directorLogin = '';
            if (!isIssueEdit && username) {
              const info = hubbers[username] || hubbers[username.toLowerCase()] || {};
              managerLogin = info.manager || '';
              const mgrInfo = managerLogin ? (hubbers[managerLogin] || hubbers[managerLogin.toLowerCase()] || {}) : {};
              directorLogin = mgrInfo.manager || '';
              console.log(`Manager: ${managerLogin || '(unknown)'}, Director: ${directorLogin || '(unknown)'}`);
            }

            // ── Get issue body & find table ─────────────────────────────
            const issue = await github.rest.issues.get({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number
            });
            let body = issue.data.body;
            if (!body) {
              const who = isIssueEdit ? context.payload.sender.login : username;
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number,
                body: `@${who} ⚠️ Issue body is empty — cannot update attendance.`
              });
              core.setFailed('Issue body is empty');
              return;
            }

            const tableMatch = body.match(TABLE_RE);
            if (!tableMatch) {
              const who = isIssueEdit ? context.payload.sender.login : username;
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number,
                body: `@${who} ⚠️ Could not find an attendance table (requires a "Your Handle" column).`
              });
              core.setFailed('Attendance table not found');
              return;
            }

            const tableHeader = tableMatch[1];
            let tableRows = tableMatch[2];
            const headerLine = tableHeader.split('\n')[0];
            const columns = headerLine.split('|').map(c => c.trim()).filter(Boolean);

            // ── Insert / update user row (comment events only) ──────────
            if (!isIssueEdit) {
              const columnData = {
                'your handle':   `@${username}`,
                'manager':       managerLogin ? `@${managerLogin}` : '',
                'team':          directorLogin ? `@${directorLogin}` : '',
                'microsoft id':  msId,
                'attendance':    attendanceEmoji,
                'allergies':     allergies,
                'dietary requirements': dietary,
                'arrival flight': arrival,
                'arrival flight date/time/airport': arrival,
                'departure flight': departure,
                'departure flight date/time/airport': departure,
              };
              const rowValues = columns.map(c => columnData[norm(c)] ?? '');
              const newRow = `| ${rowValues.join(' | ')} |`;
              const userRe = new RegExp(`^\\s*\\|\\s*@?${escRe(username)}\\s*\\|`, 'm');

              if (userRe.test(tableRows)) {
                tableRows = tableRows.replace(new RegExp(`^\\s*\\|\\s*@?${escRe(username)}\\s*\\|[^\\n]*`, 'gm'), newRow);
              } else {
                tableRows = tableRows.trimEnd() + (tableRows.trim() ? '\n' : '') + newRow + '\n';
              }
            }

            // ── Build manager IC roster from hubbers ────────────────────
            const mgrToICs = {};
            for (const [login, info] of Object.entries(hubbers)) {
              if (login !== login.toLowerCase()) continue;
              if (info.manager) {
                if (!mgrToICs[info.manager]) mgrToICs[info.manager] = new Set();
                mgrToICs[info.manager].add(login);
              }
            }

            // ── Count attendance & build team tree ──────────────────────
            const attColIdx    = columns.findIndex(c => norm(c) === 'attendance');
            const handleColIdx = columns.findIndex(c => norm(c) === 'your handle');
            const teamTree = {};
            const respondedHandles = new Set();
            let attending = 0, unsure = 0, notAttending = 0;

            for (const row of tableRows.split('\n').filter(r => r.trim().startsWith('|'))) {
              const cells = row.split('|').map(c => c.trim()).slice(1);
              if (cells.every(c => !c || /^:?-+:?$/.test(c))) continue;
              const handle = (cells[handleColIdx] || '').replace(/^@/, '').trim();
              if (!handle) continue;
              respondedHandles.add(handle.toLowerCase());

              let emoji = (cells[attColIdx] || '').replace(/[*_`]/g, '').trim();
              if (emoji === '👍') attending++;
              else if (emoji === '😐') unsure++;
              else if (emoji === '👎') notAttending++;

              const rowUser = hubbers[handle] || hubbers[handle.toLowerCase()] || {};
              const rowMgr  = rowUser.manager || 'Unknown Manager';
              const mgrData = hubbers[rowMgr] || hubbers[rowMgr.toLowerCase()] || {};
              const rowDir  = mgrData.manager || 'Unknown Director';
              if (!teamTree[rowDir]) teamTree[rowDir] = {};
              if (!teamTree[rowDir][rowMgr]) teamTree[rowDir][rowMgr] = [];
              teamTree[rowDir][rowMgr].push({ handle, emoji });
            }

            // ── Find no-response ICs ────────────────────────────────────
            const allMgrs = new Set();
            for (const managers of Object.values(teamTree))
              for (const mgr of Object.keys(managers)) allMgrs.add(mgr);
            if (!isIssueEdit && managerLogin) allMgrs.add(managerLogin);

            let noResponse = 0;
            for (const mgr of allMgrs) {
              const ics = mgrToICs[mgr] || mgrToICs[mgr.toLowerCase()] || new Set();
              const mgrData = hubbers[mgr] || hubbers[mgr.toLowerCase()] || {};
              const dir = mgrData.manager || 'Unknown Director';
              if (!teamTree[dir]) teamTree[dir] = {};
              if (!teamTree[dir][mgr]) teamTree[dir][mgr] = [];
              for (const ic of ics) {
                if (!respondedHandles.has(ic.toLowerCase())) {
                  noResponse++;
                  teamTree[dir][mgr].push({ handle: ic, emoji: '❓' });
                }
              }
            }

            const totalResponded = attending + unsure + notAttending;
            const totalExpected  = totalResponded + noResponse;
            console.log(`👍 ${attending} · 😐 ${unsure} · 👎 ${notAttending} · ❓ ${noResponse} — ${totalResponded}/${totalExpected}`);

            // ── Build summary ───────────────────────────────────────────
            const now = new Date();
            const ts = `${MONTH_NAMES[now.getUTCMonth()]} ${now.getUTCDate()}, ${now.getUTCFullYear()} at ${
              (now.getUTCHours() % 12 || 12)}:${String(now.getUTCMinutes()).padStart(2,'0')} ${
              now.getUTCHours() >= 12 ? 'PM' : 'AM'} UTC`;

            const marker = '<!-- attendance-summary-auto-generated -->';
            let summary = `${marker}\n`;
            summary += `**Attendance Summary:** 👍 ${attending} attending · 😐 ${unsure} unsure · 👎 ${notAttending} not attending · ❓ ${noResponse} no response · **${totalResponded}/${totalExpected} responded**\n\n`;

            summary += `<details><summary><strong>Breakdown by Team</strong></summary>\n\n`;
            for (const [dir, managers] of Object.entries(teamTree).sort()) {
              const dirLabel = dir === 'Unknown Director' ? dir : `@${dir}`;
              summary += `#### ${dirLabel}\n\n`;
              for (const [mgr, members] of Object.entries(managers).sort()) {
                const mgrLabel = mgr === 'Unknown Manager' ? mgr : `@${mgr}`;
                const a  = members.filter(m => m.emoji === '👍').length;
                const u  = members.filter(m => m.emoji === '😐').length;
                const n  = members.filter(m => m.emoji === '👎').length;
                const nr = members.filter(m => m.emoji === '❓').length;
                summary += `- **${mgrLabel}** — 👍 ${a} · 😐 ${u} · 👎 ${n} · ❓ ${nr} (${members.length - nr}/${members.length} responded)\n`;
              }
              summary += `\n`;
            }
            summary += `</details>\n\n`;
            summary += `_Last updated: ${ts}_\n${marker}\n\n`;

            // ── Reconstruct issue body ──────────────────────────────────
            const removeSummary = (text) =>
              text.replace(/<!-- attendance-summary-auto-generated -->[\s\S]*?<!-- attendance-summary-auto-generated -->\s*/g, '')
                  .replace(/<!-- attendance-summary -->[\s\S]*?<!-- attendance-summary -->\s*/g, '');

            let beforeTable = removeSummary(body.substring(0, body.indexOf(tableMatch[0])));
            let afterTable  = removeSummary(body.substring(body.indexOf(tableMatch[0]) + tableMatch[0].length));

            await github.rest.issues.update({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
              body: beforeTable + summary + tableHeader + tableRows + afterTable
            });

            // ── Post-processing for comment events ──────────────────────
            if (!isIssueEdit) {
              // Transform attendance text → emoji in the original comment
              const attLineMatch = comment.match(/(\| \*\*Attendance\*\* \| )(attending|unsure|not_attending)( \|)/);
              if (attLineMatch) {
                const emoji = ATTENDANCE_TEXT_TO_EMOJI[attLineMatch[2]];
                if (emoji) {
                  await github.rest.issues.updateComment({
                    owner: context.repo.owner, repo: context.repo.repo,
                    comment_id: context.payload.comment.id,
                    body: comment.replace(attLineMatch[0], `${attLineMatch[1]}${emoji}${attLineMatch[3]}`)
                  });
                }
              }
              console.log(`Updated table for @${username}`);
            } else {
              console.log('Summary recounted after manual edit');
            }

            console.log('=== Workflow completed ===');
